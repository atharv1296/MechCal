databases:
  - name: mech-calc-db
    databaseName: mech_calc
    user: admin
    plan: free # Use 'free' tier

services:
  - type: web
    name: mech-calc
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mech-calc-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
